<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peakstack Energy Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-100 flex h-screen overflow-hidden text-slate-800">

    <aside class="w-72 bg-[#001529] text-white flex flex-col shadow-xl">
        <div class="p-6">
            <div class="flex items-center gap-2 mb-2">
                <div class="w-8 h-8 bg-emerald-500 rounded flex items-center justify-center font-bold text-white italic text-xl">P</div>
                <span class="text-lg font-bold tracking-tight uppercase">Peakstack <span class="text-emerald-400">Energy</span></span>
            </div>
            <p class="text-[10px] text-slate-400 uppercase tracking-widest">Smart Energy Investment Platform</p>
        </div>

        <div class="flex-1 overflow-y-auto px-6 py-4 space-y-6">
            <div class="bg-[#002140] p-2 rounded text-xs font-bold uppercase tracking-widest flex items-center gap-2">
                <span class="text-emerald-400">⚙</span> Configuration
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-[11px] text-slate-400 uppercase font-bold mb-2">Battery Capacity (kWh)</label>
                    <input type="range" id="capacity" min="100" max="2000" value="600" class="w-full h-1 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-emerald-500" oninput="capLabel.innerText=this.value">
                    <div class="flex justify-between text-[10px] mt-1 text-slate-500"><span>100</span> <span id="capLabel" class="text-emerald-400 font-bold">600</span> <span>2000</span></div>
                </div>
                <div>
                    <label class="block text-[11px] text-slate-400 uppercase font-bold mb-2">Battery Power (kW)</label>
                    <input type="range" id="power" min="50" max="500" value="200" class="w-full h-1 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-emerald-500" oninput="pwrLabel.innerText=this.value">
                    <div class="flex justify-between text-[10px] mt-1 text-slate-500"><span>50</span> <span id="pwrLabel" class="text-emerald-400 font-bold">200</span> <span>500</span></div>
                </div>
            </div>

            <button id="runBtn" onclick="runAnalysis()" class="w-full bg-[#1da57a] hover:bg-emerald-500 py-3 rounded text-sm font-bold transition-all shadow-lg mt-10">
                ▶ Run Investment Analysis
            </button>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto p-8 bg-slate-50">
        <div class="bg-gradient-to-r from-[#064e3b] to-[#065f46] rounded-2xl p-8 text-white flex justify-between items-center shadow-2xl mb-8">
            <div>
                <p class="text-emerald-400 text-[10px] font-bold uppercase tracking-widest mb-2">Recommendation</p>
                <h1 class="text-5xl font-black mb-2">INSTALL BESS</h1>
                <p class="text-emerald-200 text-sm opacity-80">Optimized for industrial peak shaving in Karnataka</p>
            </div>
            <div class="flex gap-12 text-center">
                <div>
                    <p class="text-xs opacity-70 mb-1">Payback</p>
                    <p id="paybackLabel" class="text-3xl font-bold">4.2 <span class="text-sm font-normal">Years</span></p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <p class="text-slate-500 text-xs font-bold uppercase mb-1">Monthly Savings</p>
                <h2 id="savingsLabel" class="text-3xl font-black text-slate-800">₹ 0</h2>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <p class="text-slate-500 text-xs font-bold uppercase mb-1">Peak Reduction</p>
                <h2 id="peakLabel" class="text-3xl font-black text-blue-600">0%</h2>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <p class="text-slate-500 text-xs font-bold uppercase mb-1">Confidence</p>
                <h2 class="text-3xl font-black text-emerald-500">HIGH</h2>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <h3 class="font-bold text-slate-700 mb-4">Load Profile (kW) - 24H Optimization</h3>
            <div class="h-80">
                <canvas id="loadChart"></canvas>
            </div>
        </div>
    </main>

    <script>
        let loadChart;

        function initCharts() {
            const ctx = document.getElementById('loadChart').getContext('2d');
            loadChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array.from({length: 96}, (_, i) => `${Math.floor(i/4)}:${(i%4)*15}`), // 15-min intervals
                    datasets: [
                        { label: 'Baseline', data: [], borderColor: '#94a3b8', borderWidth: 2, pointRadius: 0, tension: 0.4 },
                        { label: 'With BESS', data: [], borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)', borderWidth: 4, fill: true, pointRadius: 0, tension: 0.4 }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
            });
        }

        async function runAnalysis() {
            const btn = document.getElementById('runBtn');
            btn.innerText = "⏳ Optimizing...";
            btn.disabled = true;

            try {
                const response = await fetch('http://127.0.0.1:8000/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        battery_capacity: document.getElementById('capacity').value,
                        battery_power: document.getElementById('power').value
                    })
                });
                
                const data = await response.json();
                
                document.getElementById('savingsLabel').innerText = `₹ ${data.monthly_savings.toLocaleString()}`;
                document.getElementById('peakLabel').innerText = `${data.peak_reduction}%`;
                
                loadChart.data.datasets[0].data = data.baseline_load;
                loadChart.data.datasets[1].data = data.optimized_load;
                loadChart.update();
            } catch (err) {
                alert("Check if main.py is running!");
            } finally {
                btn.innerText = "▶ Run Investment Analysis";
                btn.disabled = false;
            }
        }

        window.onload = initCharts;
    </script>
</body>
</html>
